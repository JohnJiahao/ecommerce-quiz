<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>电子商务题库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f2f5;min-height:100vh;color:#333}

.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:14px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.12);position:relative}
.header h1{font-size:22px}
.header p{font-size:12px;opacity:.8}
.header .back-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;display:none;text-decoration:none}
.header .back-btn:hover{background:rgba(255,255,255,.25)}

.container{max-width:800px;margin:20px auto;padding:0 16px}

/* Setup */
.setup-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}
.setup-card h2{font-size:17px;margin-bottom:14px}
.btn-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.mode-btn{flex:1;min-width:120px;padding:11px 14px;border:2px solid #e0e0e0;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;transition:all .2s;text-align:center}
.mode-btn:hover{border-color:#1a73e8;color:#1a73e8}
.mode-btn.on{border-color:#1a73e8;background:#e8f0fe;color:#1a73e8;font-weight:bold}
.mode-btn small{display:block;font-size:11px;color:#999;font-weight:normal;margin-top:2px}
.type-row{display:flex;margin-bottom:16px;border-radius:8px;overflow:hidden;border:1.5px solid #e0e0e0;transition:opacity .2s}
#typeSection.hidden{display:none}
.type-btn{flex:1;padding:10px;text-align:center;background:#fff;cursor:pointer;font-size:13px;border:none;border-right:1.5px solid #e0e0e0}
.type-btn:last-child{border-right:none}
.type-btn:hover{background:#f5f8ff}
.type-btn.on{background:#1a73e8;color:#fff}
.start-btn{display:block;width:100%;padding:13px;font-size:16px;background:linear-gradient(135deg,#1a73e8,#1557b0);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:bold;letter-spacing:2px}
.start-btn:hover{filter:brightness(1.1)}
.type-label{font-size:13px;color:#999;margin-bottom:6px}

/* Quiz */
.quiz-wrap{display:none}
/* Quiz layout: sidebar + main */
.quiz-body{display:flex;gap:14px;align-items:flex-start}
.sidebar{display:grid;grid-template-columns:repeat(5, 48px);gap:6px;background:#fff;border-radius:12px;padding:10px 8px;box-shadow:0 1px 3px rgba(0,0,0,.06);flex-shrink:0;align-content:flex-start;overflow-y:auto;max-height:420px}
.sidebar::-webkit-scrollbar{width:5px}
.sidebar::-webkit-scrollbar-thumb{background:#c0c0c0;border-radius:3px}
.qnum{width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;transition:all .15s;color:#666;background:#f0f0f0;border:2px solid transparent}
.qnum:hover{background:#dde4f0;border-color:#90a4ae}
.qnum.done{background:#c8e6c9;color:#2e7d32;border-color:#a5d6a7}
.qnum.bad{background:#ffcdd2;color:#c62828;border-color:#ef9a9a}
.qnum.now{background:#1a73e8;color:#fff;border-color:#0d47a1;box-shadow:0 3px 8px rgba(26,115,232,.35);transform:scale(1.08)}
.qnum.skipped{background:#ffe0b2;color:#e65100;border-color:#ffcc80}
.main-col{flex:1;min-width:0}

@media(max-width:768px){
  .quiz-body{flex-direction:column;align-items:stretch}
  .sidebar{display:flex;overflow-x:auto;overflow-y:hidden;padding:8px;gap:6px;border-radius:12px;max-width:100%;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
  .sidebar .qnum{width:44px;height:44px;font-size:14px;flex-shrink:0;scroll-snap-align:start}
  .sidebar .qnum.now{transform:none}
}

.qcard{background:#fff;border-radius:14px;padding:24px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
.badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:bold;margin-bottom:10px}
.badge.s{background:#e8f5e9;color:#2e7d32}
.badge.m{background:#fff3e0;color:#e65100}
.badge.f{background:#e3f2fd;color:#1565c0}
.badge.e{background:#fce4ec;color:#c62828}
.qidx{font-size:12px;color:#999;float:right;margin-top:2px}
.qtext{font-size:16px;line-height:2;margin-bottom:16px}

.opt{margin-bottom:8px}
.opt label{display:flex;align-items:center;padding:11px 13px;border:1.5px solid #e8e8e8;border-radius:10px;cursor:pointer;font-size:14px;transition:all .15s}
.opt label:hover{background:#f8f9ff;border-color:#90caf9}
.opt input{margin-right:10px;flex-shrink:0;accent-color:#1a73e8}
.opt.sel label{background:#e8f0fe;border-color:#1a73e8}
.opt.ok label{background:#e8f5e9;border-color:#4caf50}
.opt.err label{background:#ffebee;border-color:#ef5350}

.fill-line{display:inline-block;vertical-align:bottom}
.fill-inp{width:110px;border:none;border-bottom:2px dashed #999;padding:2px 6px;font-size:15px;text-align:center;outline:none;margin:0 3px}
.fill-inp:focus{border-bottom-color:#1a73e8;border-bottom-style:solid}
.fill-inp.ok{border-bottom-color:#4caf50;color:#2e7d32;font-weight:bold}
.fill-inp.bad{border-bottom-color:#ef5350;color:#c62828;text-decoration:line-through}
.fill-hint{font-size:12px;color:#2e7d32;font-weight:bold;margin-left:4px}

.essay-ta{width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;resize:vertical;min-height:140px;font-family:inherit;line-height:1.7}
.essay-ta:focus{outline:none;border-color:#1a73e8}

/* Reveal */
.reveal{display:none;margin-top:14px;padding:14px;background:#f5f7fa;border-radius:10px;font-size:14px;line-height:1.7}
.reveal.show{display:block}
.reveal .icon{font-size:36px;display:block;text-align:center;margin-bottom:4px}
.reveal .msg{text-align:center;font-size:15px;font-weight:bold;margin-bottom:8px}
.reveal .msg.good{color:#2e7d32}
.reveal .msg.ng{color:#c62828}
.reveal .ans{text-align:center;color:#2e7d32;font-weight:bold}
.reveal .ref{white-space:pre-wrap;margin-top:8px;padding:12px;background:#fafafa;border-radius:6px;font-size:13px}

/* Nav */
.nav-row{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.nav-btn{padding:10px 22px;border:1.5px solid #d0d0d0;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;white-space:nowrap}
.nav-btn:hover{background:#f5f5f5}
.nav-btn.pri{background:#1a73e8;color:#fff;border-color:#1a73e8;font-weight:bold}
.nav-btn.pri:hover{background:#1557b0}
.nav-btn.warn{background:#fff;color:#f44336;border-color:#f44336}
.nav-btn.warn:hover{background:#ffebee}
.nav-btn.skip{background:#fff;color:#ff9800;border-color:#ff9800}
.nav-btn.skip:hover{background:#fff3e0}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}

/* Lightbox */
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:9999;cursor:pointer;align-items:center;justify-content:center}
.lightbox.show{display:flex}
.lightbox img{max-width:95%;max-height:95%;border-radius:4px}
.lightbox .close{position:absolute;top:16px;right:24px;color:#fff;font-size:32px;cursor:pointer}

/* Results */
.result-wrap{display:none}
.score-card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.score-num{font-size:68px;font-weight:bold;color:#1a73e8;line-height:1}
.score-sub{font-size:16px;color:#999;margin:8px 0}
.enc{font-size:20px;font-weight:bold;margin:14px 0;padding:12px;border-radius:10px}
.enc.a{background:#e8f5e9;color:#2e7d32}
.enc.b{background:#e3f2fd;color:#1565c0}
.enc.c{background:#fff3e0;color:#e65100}
.enc.d{background:#ffebee;color:#c62828}
.detail{text-align:left;margin-top:16px}
.dline{display:flex;align-items:center;padding:9px 12px;margin-bottom:5px;border-radius:8px;font-size:13px}
.dline.g{background:#f1f8f4}
.dline.r{background:#fef2f2}
.dline .di{margin-right:10px;font-weight:bold;min-width:22px}
.dline .ds{margin-left:auto;font-size:16px}
.rst-btn{display:block;width:100%;padding:13px;margin-top:14px;font-size:15px;background:#1a73e8;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:bold}
.rst-btn:hover{filter:brightness(1.1)}

/* Summary section in results */
.type-summary{margin:16px 0;text-align:left}
.type-summary h3{font-size:14px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}
.type-summary .ts-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 8px;color:#666}

@media(max-width:600px){
  .header h1{font-size:18px}
  .qtext{font-size:14px}
  .opt label{font-size:13px;padding:9px 11px}
  .fill-inp{width:80px}
  .score-num{font-size:52px}
  .nav-btn{padding:8px 14px;font-size:13px}
}
</style>
</head>
<body>

<div class="header" id="headerBar">
  <button class="back-btn" id="backBtn" onclick="goBack()">&#9664; 返回</button>
  <h1>电子商务题库</h1>
  <p>期末复习练习系统 · v5</p>
</div>

<div class="container">

<!-- SETUP -->
<div id="setupPanel">
  <div class="setup-card">
    <h2>选择做题模式</h2>
    <div class="btn-row" id="modeBtns">
      <button class="mode-btn on" data-v="sequential">顺序做题<small>全部题型逐一练习</small></button>
      <button class="mode-btn" data-v="random">随机做题<small>自选类型随机抽题</small></button>
    </div>
    <div id="typeSection">
      <div class="type-label">选择题目类型</div>
      <div class="type-row" id="typeBtns">
        <button class="type-btn on" data-v="single">单选题</button>
        <button class="type-btn" data-v="multi">多选题</button>
        <button class="type-btn" data-v="fill">填空题</button>
        <button class="type-btn" data-v="essay">论述题</button>
      </div>
    </div>
    <button class="start-btn" id="startBtn">开 始 做 题</button>
  </div>
</div>

<!-- QUIZ -->
<div class="quiz-wrap" id="quizWrap">
  <div class="quiz-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-col">
      <div class="qcard" id="qcard"></div>
    </div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" id="prevBtn">&#9664; 上一题</button>
    <span style="font-size:13px;color:#999" id="navHint"></span>
    <button class="nav-btn pri" id="nextBtn">下一题 &#9654;</button>
    <button class="nav-btn skip" id="skipBtn" style="display:none">跳过 ▸</button>
  </div>
  <button class="nav-btn warn" id="submitBtn" style="display:none;width:100%;margin-top:10px">&#128203; 交卷</button>
</div>

<!-- RESULTS -->
<div class="result-wrap" id="resultWrap"></div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <span class="close">&times;</span>
  <img id="lightboxImg" src="" alt="放大图片">
</div>

</div>

<script>
var singleBank = [

var multiBank = [

function shuffleOpts(q){
  if(!q.o || q.a===undefined) return;
  var pairs = q.o.map(function(opt,oi){ return {opt:opt,orig:oi}; });
  for(var pi=pairs.length-1;pi>0;pi--){
    var pj=Math.floor(Math.random()*(pi+1));
    var pt=pairs[pi]; pairs[pi]=pairs[pj]; pairs[pj]=pt;
  }
  q.o = pairs.map(function(p){ return p.opt; });
  if(Array.isArray(q.a)){
    q.a = q.a.map(function(origIdx){
      for(var k=0;k<pairs.length;k++){ if(pairs[k].orig===origIdx) return k; }
      return origIdx;
    });
  } else {
    for(var k=0;k<pairs.length;k++){ if(pairs[k].orig===q.a){ q.a=k; break; } }
  }
}

function startQuiz(){
  if(mode==='sequential'){
    // 顺序做题：全部题型混排，每题选项乱序（深拷贝避免改原数据）
    qlist = [];
    singleBank.forEach(function(q){
      var nq = {_t:'single', q:q.q, o:q.o.slice(), a:Array.isArray(q.a)?q.a.slice():q.a};
      shuffleOpts(nq); qlist.push(nq);
    });
    multiBank.forEach(function(q){
      var nq = {_t:'multi', q:q.q, o:q.o.slice(), a:Array.isArray(q.a)?q.a.slice():q.a};
      shuffleOpts(nq); qlist.push(nq);
    });
    fillBank.forEach(function(q){
      qlist.push({_t:'fill', q:q.q, a:q.a.slice()});
    });
    essayBank.forEach(function(q){
      qlist.push({_t:'essay', q:q.q, r:q.r, img:q.img||null});
    });
  } else {
    // 随机做题：按选定类型抽10题
    var bank;
    if(randType==='single') bank = singleBank;
    else if(randType==='multi') bank = multiBank;
    else if(randType==='fill') bank = fillBank;
    else bank = essayBank;

    var arr = bank.slice();
    for(var i=arr.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var t=arr[i]; arr[i]=arr[j]; arr[j]=t;
    }
    if(randType==='essay'){
      qlist = arr.map(function(q){ return {_t:'essay', q:q.q, r:q.r, img:q.img||null}; });
    } else {
      arr = arr.slice(0,10);
      qlist = arr.map(function(q){
        if(randType==='fill'){
          return {_t:'fill', q:q.q, a:q.a.slice()};
        }
        var nq = {_t:randType, q:q.q, o:q.o.slice(), a:Array.isArray(q.a)?q.a.slice():q.a};
        shuffleOpts(nq); return nq;
      });
    }
  }

  idx = 0;
  revealed = {};
  skipped = {};
  answers = {};
  correct = {};
  done = false;

  document.getElementById('setupPanel').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('resultWrap').innerHTML = '';
  document.getElementById('backBtn').style.display = 'block';

  renderSidebar();
  renderQ();
  updateNav();
  window.scrollTo(0,0);
}

  document.getElementById('backBtn').style.display = 'none';

// ==================== 渲染 ====================
function renderSidebar(){
  var html = '';
  for(var i=0;i<qlist.length;i++){
    var cls = 'qnum';
    if(i===idx) cls += ' now';
    else if(correct[i]===true) cls += ' done';
    else if(correct[i]===false) cls += ' bad';
    else if(skipped[i]) cls += ' skipped';
    else if(revealed[i]) cls += ' skipped';
    html += '<div class="'+cls+'" data-i="'+i+'">'+(i+1)+'</div>';
  }
  var bar = document.getElementById('sidebar');
  bar.innerHTML = html;
  bar.querySelectorAll('.qnum').forEach(function(d){
    d.addEventListener('click', function(){ jumpTo(parseInt(this.getAttribute('data-i'))); });
  });
}

function renderQ(){
  var q = qlist[idx];
  var qt = q._t;
  var html = '';

  // Badge
  var bt='', bc='';
  if(qt==='single'){ bt='单选'; bc='s'; }
  else if(qt==='multi'){ bt='多选'; bc='m'; }
  else if(qt==='fill'){ bt='填空'; bc='f'; }
  else { bt='论述'; bc='e'; }
  html += '<span class="badge '+bc+'">'+bt+'</span>';
  html += '<span class="qidx">第 '+(idx+1)+' / '+qlist.length+' 题</span>';

  // Question text
  if(qt==='fill'){
    html += '<div class="qtext">'+renderFillText(q)+'</div>';
  } else {
    html += '<div class="qtext">'+q.q.replace(/\n/g,'<br>')+'</div>';
  }

  // Options area
  if(qt==='single' || qt==='multi'){
    html += '<div id="optArea">';
    var saved = answers[idx];
    var rev = revealed[idx];
    for(var oi=0; oi<q.o.length; oi++){
      var sel = false;
      if(qt==='single') sel = (saved===oi);
      else sel = (saved && saved.indexOf(oi)>=0);

      var cls = 'opt';
      if(rev){
        var isCorrect = (qt==='single') ? (q.a===oi) : (q.a.indexOf(oi)>=0);
        if(isCorrect) cls += ' ok';
        else if(sel) cls += ' err';
      } else if(sel){
        cls += ' sel';
      }

      var inpType = (qt==='single') ? 'radio' : 'checkbox';
      var checked = sel ? ' checked' : '';
      var disabled = rev ? ' disabled' : '';
      var label = String.fromCharCode(65+oi) + '. ' + q.o[oi];

      html += '<div class="'+cls+'"><label>';
      html += '<input type="'+inpType+'" name="opt" value="'+oi+'"'+checked+disabled+'>';
      html += '<span>'+label+'</span>';
      html += '</label></div>';
    }
    html += '</div>';
  }

  // Essay
  if(qt==='essay'){
    var saved = answers[idx] || '';
    var dis = revealed[idx] ? ' disabled' : '';
    html += '<textarea class="essay-ta" id="essayTa" placeholder="请输入你的答案..."'+dis+'>'+saved+'</textarea>';
  }

  // Reveal
  var showRev = revealed[idx];
  html += '<div class="reveal'+(showRev?' show':'')+'" id="revealArea">';
  if(showRev) html += getRevealHTML(q,qt);
  html += '</div>';

  document.getElementById('qcard').innerHTML = html;

  // 同步侧边栏高度与题目卡片
  var qcard = document.getElementById('qcard');
  var sidebar = document.getElementById('sidebar');
  var qh = qcard.offsetHeight;
  if(qh > 200){ sidebar.style.maxHeight = qh + 'px'; }

  // Bind events
  if(qt==='single' || qt==='multi'){
    document.getElementById('optArea').addEventListener('change', onOptChange);
  }
  if(qt==='fill'){
    document.querySelectorAll('#qcard .fill-inp').forEach(function(inp){
      inp.addEventListener('input', onFillChange);
    });
  }
  if(qt==='essay'){
    var ta = document.getElementById('essayTa');
    if(ta) ta.addEventListener('input', onEssayChange);
  }
}

function renderFillText(q){
  var parts = q.q.split(/__(\d+)__/);
  var h = '';
  // 已揭示时，收集未匹配的正确答案用于提示
  var unmatched = revealed[idx] ? q.a.map(function(a){ return a.toLowerCase().trim(); }) : [];
  for(var i=0;i<parts.length;i++){
    if(i%2===1){
      var ni = parseInt(parts[i])-1;
      var dis = revealed[idx] ? ' disabled' : '';
      var saved = answers[idx] || [];
      var val = saved[ni] || '';
      var cls = 'fill-inp';
      if(revealed[idx]){
        var uv = (val||'').toLowerCase().trim();
        var matchIdx = -1;
        for(var u=0;u<unmatched.length;u++){
          if(uv && unmatched[u]===uv){ matchIdx=u; break; }
        }
        if(matchIdx>=0){
          cls += ' ok';
          unmatched.splice(matchIdx,1);
        } else {
          cls += ' bad';
        }
      }
      h += '<span class="fill-line"><input type="text" class="'+cls+'" id="fill'+ni+'" value="'+esc(val)+'" placeholder="'+(ni+1)+'"'+dis+'></span>';
    } else {
      h += parts[i];
    }
  }
  return h;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showLightbox(src){ document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').classList.add('show'); }

function getRevealHTML(q,qt){
  var ok = correct[idx];
  var h = '';
  if(qt==='essay'){
    if(q.img) h += '<div style="text-align:center;margin-bottom:10px"><img src="'+q.img+'" style="max-width:100%;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.1);cursor:pointer" alt="图示" onclick="showLightbox(this.src)"></div>';
    h += '<div style="font-weight:bold;margin-bottom:6px">参考答案：</div>';
    h += '<div class="ref">'+q.r+'</div>';
  } else if(ok===undefined){
    // 跳过
    h += '<span class="icon">⏭</span>';
    h += '<div class="msg" style="color:#ff9800">已跳过此题</div>';
    h += '<div class="ans">正确答案：'+fmtAns(q,qt)+'</div>';
  } else if(ok){
    h += '<span class="icon">✅</span>';
    h += '<div class="msg good">回答正确！太棒了！</div>';
    if(qt==='fill') h += '<div style="text-align:center;color:#999;font-size:12px">正确答案：'+q.a.join('、')+'</div>';
  } else {
    h += '<span class="icon">❌</span>';
    h += '<div class="msg ng">回答错误</div>';
    h += '<div class="ans">正确答案：'+fmtAns(q,qt)+'</div>';
  }
  return h;
}

function fmtAns(q,qt){
  if(qt==='single') return String.fromCharCode(65+q.a)+'. '+q.o[q.a];
  if(qt==='multi') return q.a.map(function(v){ return String.fromCharCode(65+v)+'. '+q.o[v]; }).join('、');
  if(qt==='fill') return q.a.join('、');
  return '';
}

// ==================== 事件处理 ====================
function onOptChange(){
  if(revealed[idx]) return;
  var qt = qlist[idx]._t;
  if(qt==='single'){
    var rb = document.querySelector('input[name="opt"]:checked');
    answers[idx] = rb ? parseInt(rb.value) : undefined;
    document.querySelectorAll('#optArea .opt').forEach(function(el,i){
      el.classList.toggle('sel', i===answers[idx]);
    });
  } else {
    var cbs = document.querySelectorAll('input[name="opt"]:checked');
    var arr = [];
    cbs.forEach(function(cb){ arr.push(parseInt(cb.value)); });
    answers[idx] = arr;
    document.querySelectorAll('#optArea .opt').forEach(function(el,i){
      el.classList.toggle('sel', arr.indexOf(i)>=0);
    });
  }
}

function onFillChange(){
  if(revealed[idx]) return;
  var q = qlist[idx];
  var vals = [];
  for(var i=0;i<q.a.length;i++){
    var inp = document.getElementById('fill'+i);
    vals.push(inp ? inp.value.trim() : '');
  }
  answers[idx] = vals;
}

function onEssayChange(){
  if(revealed[idx]) return;
  var ta = document.getElementById('essayTa');
  if(ta) answers[idx] = ta.value;
}

// ==================== 确认/导航 ====================
function doReveal(){
  if(revealed[idx]) return;
  var q = qlist[idx];
  var qt = q._t;
  var ua = answers[idx];

  if(qt==='single'){
    correct[idx] = (ua===q.a);
  } else if(qt==='multi'){
    var arr = ua || [];
    correct[idx] = (arr.length===q.a.length && q.a.every(function(v){ return arr.indexOf(v)>=0; }));
  } else if(qt==='fill'){
    var vals = ua || [];
    // 顺序无关：每个正确答案只需在任一输入框匹配即可
    var remaining = q.a.map(function(a){ return a.toLowerCase().trim(); });
    var filled = vals.filter(function(v){ return v && v.trim(); }).map(function(v){ return v.toLowerCase().trim(); });
    correct[idx] = remaining.length === filled.length && remaining.every(function(a){
      var found = filled.indexOf(a);
      if(found>=0){ filled.splice(found,1); return true; }
      return false;
    });
  }

  revealed[idx] = true;
  delete skipped[idx];
  renderQ();
  renderSidebar();
  updateNav();
}

function hasAns(){
  var qt = qlist[idx]._t;
  if(qt==='single') return answers[idx]!==undefined;
  if(qt==='multi') return answers[idx] && answers[idx].length>0;
  if(qt==='fill'){ var v=answers[idx]; return v && v.some(function(x){ return x&&x.trim(); }); }
  if(qt==='essay'){ var v=answers[idx]; return v && v.trim().length>0; }
  return false;
}

function nextQ(){
  if(!revealed[idx]){
    if(!hasAns()){
      alert('请先作答再确认！');
      return;
    }
    doReveal();
    if(idx===qlist.length-1) updateNav();
    return;
  }
  if(idx < qlist.length-1){
    idx++;
    renderQ();
    renderSidebar();
    updateNav();
    window.scrollTo(0,0);
  }
}

function skipQ(){
  if(revealed[idx]) return;
  skipped[idx] = true;
  if(idx < qlist.length-1){
    idx++;
    renderQ();
    renderSidebar();
    updateNav();
    window.scrollTo(0,0);
  }
}

function prevQ(){
  if(idx > 0){
    idx--;
    renderQ();
    renderSidebar();
    updateNav();
    window.scrollTo(0,0);
  }
}

function jumpTo(i){
  if(done) return;
  idx = i;
  renderQ();
  renderSidebar();
  updateNav();
  window.scrollTo(0,0);
}

function updateNav(){
  document.getElementById('prevBtn').disabled = (idx===0);
  var nextBtn = document.getElementById('nextBtn');
  var skipBtn = document.getElementById('skipBtn');
  var submitBtn = document.getElementById('submitBtn');
  var hint = document.getElementById('navHint');
  hint.textContent = '';
  if(qlist[idx]) hint.textContent = getTypeLabel(qlist[idx]._t);

  var isLast = (idx===qlist.length-1);
  var rev = revealed[idx];

  if(isLast && rev){
    nextBtn.style.display = 'none';
    skipBtn.style.display = 'none';
    submitBtn.style.display = 'block';
  } else if(!rev){
    nextBtn.style.display = 'inline-block';
    nextBtn.textContent = '确认答案 ✓';
    skipBtn.style.display = 'inline-block';
    submitBtn.style.display = 'none';
  } else {
    nextBtn.style.display = 'inline-block';
    nextBtn.textContent = '下一题 ▶';
    skipBtn.style.display = 'none';
    submitBtn.style.display = 'none';
  }
}

function getTypeLabel(qt){
  if(qt==='single') return '单选题';
  if(qt==='multi') return '多选题';
  if(qt==='fill') return '填空题';
  if(qt==='essay') return '论述题';
  return '';
}

// ==================== 交卷 ====================
function submitAll(){
  if(done) return;
  if(!revealed[idx] && hasAns()) doReveal();

  done = true;
  document.getElementById('quizWrap').style.display = 'none';

  var total = qlist.length;
  var correctCount = 0;
  var scoreTotal = 0;
  // Count by type
  var typeScores = {single:{ok:0,total:0}, multi:{ok:0,total:0}, fill:{ok:0,total:0}, essay:{ok:0,total:0}};

  for(var i=0;i<total;i++){
    var qt = qlist[i]._t;
    if(qt!=='essay'){
      // 跳过的题目（correct 为 undefined）不计分
      if(correct[i]===true){ correctCount++; typeScores[qt].ok++; typeScores[qt].total++; scoreTotal++; }
      else if(correct[i]===false){ typeScores[qt].total++; scoreTotal++; }
      // correct[i] === undefined: 跳过，不计入total
    } else {
      typeScores.essay.total++;
    }
  }

  var pct = scoreTotal>0 ? Math.round(correctCount/scoreTotal*100) : 0;

  var grade, encCls, encMsg;
  if(pct>=90){ grade='优秀'; encCls='a'; encMsg='🏆 太棒了！你掌握得非常扎实，继续保持！'; }
  else if(pct>=70){ grade='良好'; encCls='b'; encMsg='👍 很不错！再巩固一下薄弱知识点会更好！'; }
  else if(pct>=60){ grade='及格'; encCls='c'; encMsg='💪 加油！还有提升空间，多复习几遍一定可以！'; }
  else { grade='不及格'; encCls='d'; encMsg='📚 别灰心！建议重新复习知识点，再来挑战一次吧！'; }

  var h = '<div class="score-card">';
  h += '<div class="score-num">'+correctCount+'<span style="font-size:22px;color:#999">/'+scoreTotal+'</span></div>';
  h += '<div class="score-sub">正确率 '+pct+'% &nbsp;|&nbsp; 等级：'+grade+'</div>';
  h += '<div class="enc '+encCls+'">'+encMsg+'</div>';

  // Type summary
  h += '<div class="type-summary">';
  h += '<h3>各题型得分</h3>';
  var tnames = {single:'单选题', multi:'多选题', fill:'填空题', essay:'论述题'};
  ['single','multi','fill','essay'].forEach(function(t){
    var ts = typeScores[t];
    if(ts.total>0){
      if(t==='essay'){
        h += '<div class="ts-row"><span>论述题</span><span>'+ts.total+' 题（自行评判）</span></div>';
      } else {
        var tp = Math.round(ts.ok/ts.total*100);
        h += '<div class="ts-row"><span>'+tnames[t]+'</span><span>'+ts.ok+'/'+ts.total+' （'+tp+'%）</span></div>';
      }
    }
  });
  h += '</div>';

  // Detail list
  h += '<div class="detail">';
  for(var i=0;i<total;i++){
    var q = qlist[i];
    var ok = correct[i];
    var skipped = (ok===undefined);
    var cls = skipped ? 'g' : (ok ? 'g' : 'r');
    var icon = skipped ? '⏭' : (ok ? '✅' : '❌');
    if(q._t==='essay'){ cls='g'; icon='📝'; }
    var txt = (q.q||'').replace(/<[^>]*>/g,'').replace(/\s+/g,'').slice(0,35);
    h += '<div class="dline '+cls+'"><span class="di">'+(i+1)+'</span><span>'+txt+'</span><span class="ds">'+icon+'</span></div>';
  }
  h += '</div>';
  h += '<button class="rst-btn" onclick="location.reload()">重新开始</button>';
  h += '</div>';

  document.getElementById('resultWrap').innerHTML = h;
  document.getElementById('resultWrap').style.display = 'block';
  window.scrollTo(0,0);
}

// Keyboard
document.addEventListener('keydown', function(e){
  if(done) return;
  if(document.getElementById('quizWrap').style.display==='none') return;
  if(e.key==='ArrowRight') nextQ();
  if(e.key==='ArrowLeft') prevQ();
  if(e.key==='Enter' && !revealed[idx]) nextQ();
});
</script>
